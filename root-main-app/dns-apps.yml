apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dns-apps
spec:
  destination:
    name: in-cluster
    namespace: argocd
  sources:
    - repoURL: 'https://github.com/LeegacySystem/homelab-applications'
      directory:
        exclude: '*manifest.yml'
      path: main-apps/dns
      targetRevision: HEAD
    - repoURL: 'https://github.com/LeegacySystem/homelab-applications'
      directory:
        exclude: '*manifest.yml'
      path: main-apps/dns
      targetRevision: HEAD
  project: default
