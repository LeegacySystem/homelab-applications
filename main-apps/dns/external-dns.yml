apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2" # apply after server
spec:
  project: default
  destination:
    namespace: dns-system
    name: in-cluster
  sources:
    - repoURL: https://kubernetes-sigs.github.io/external-dns/
      chart: external-dns
      targetRevision: '1.15.0'
      helm:
        parameters:
          - name: sources[0]
            value: ingress
          - name: provider.name
            value: 'pdns'
          - name: provider.pdns.server
            value: 'pdns-metrics.dns-system'
          - name: extraArgs[0]
            value: --pdns-server=http://pdns-metrics.dns-system:8081
          - name: extraArgs[1]
            value: --pdns-api-key=test123
    - repoURL: 'https://github.com/LeegacySystem/homelab-configurations'
      path: configs/pdns-server
      targetRevision: HEAD
      directory:
        include: 'external-dns.yml'
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true