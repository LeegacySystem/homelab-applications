---
#Source: powerdnsadmin/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdns-admin
  namespace: powerdns-system
  labels:
    app: pdns
    component: pdns-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pdns
      component: pdns-admin
  template:
    metadata:
      labels:
        app: pdns
        component: pdns-admin
    spec:
      securityContext:
        {}
      containers:
        - name: pdns-admin
          securityContext:
            {}
          image: "powerdnsadmin/pda-legacy:v0.4.2"
          imagePullPolicy: IfNotPresent
          env:
            # - name: SQLALCHEMY_DATABASE_URI
            #   value: "postgres://pdns-dns:pdns-pass@pdns-db:5432/pdns-db"
            #   # valueFrom:
            #   #   secretKeyRef:
            #   #     name: my-powerdnsadmin
            #   #     key: SQLALCHEMY_DATABASE_URI
            - name: PDNS_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pdns-database-password
                  key: password
          command: ["/bin/sh"]
          args:
            - "-c"
            - |
              export SQLALCHEMY_DATABASE_URI="postgres://pdns-db:${PDNS_DATABASE_PASSWORD}@pdns-database-postgresql-0:5432/pdns-database"
              exec your_application_command_here
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {}