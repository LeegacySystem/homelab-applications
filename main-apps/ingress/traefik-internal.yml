apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: internal
  namespace: argocd
spec:
  project: default
  destination:
    namespace: traefik-system
    name: in-cluster
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: '32.1.1'
      helm:
        parameters:
          - name: service.enabled
            value: 'false'
          - name: commonLabels.app
            value: "traefik-internal"
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true