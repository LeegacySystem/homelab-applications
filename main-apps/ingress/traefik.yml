apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefiik
  namespace: argocd
spec:
  project: default
  destination:
    namespace: traefik-v2
    name: in-cluster
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: '32.1.1'
      helm:
        parameters:
          - name: service.enabled
            value: 'false'
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - kind: Service # do not deploy default service
      name: traefiik-traefik
      namespace: traefik-v2